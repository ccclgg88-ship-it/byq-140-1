<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能与工具 - 雷青青 · 个人简历展示</title>

  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/skills.css">
</head>

    <nav class="navbar navbar-expand-md navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">雷青青 · 简历</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="切换导航">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html" data-ajax="false" data-role="button">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="positioning.html" data-ajax="false" data-role="button">个人定位</a></li>
            <li class="nav-item"><a class="nav-link" href="skills.html" data-ajax="false" data-role="button">技能与工具</a></li>
            <li class="nav-item"><a class="nav-link" href="works.html" data-ajax="false" data-role="button">作品与项目</a></li>
            <li class="nav-item"><a class="nav-link" href="education.html" data-ajax="false" data-role="button">教育与总结</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="container">
    <section class="skills-section">
      <h1>技能与工具</h1>
      <div class="row">
        <div class="col-md-6 skills-column">
          <h2>设计技能</h2>
          <h3 class="h6 text-muted mt-3">软件操作</h3>
          <div class="skill-item">
            <i class="bi bi-palette-fill skill-item-icon" aria-hidden="true"></i>
            <span class="name">Photoshop</span>
            <span class="level">精通</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar" style="width:95%"></div></div>
            </div>
          </div>
          <div class="skill-item">
            <i class="bi bi-palette-fill skill-item-icon" aria-hidden="true"></i>
            <span class="name">Illustrator</span>
            <span class="level">精通</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar" style="width:90%"></div></div>
            </div>
          </div>
          <div class="skill-item">
            <i class="bi bi-box-fill skill-item-icon" aria-hidden="true"></i>
            <span class="name">C4D</span>
            <span class="level">熟练</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar" style="width:75%"></div></div>
            </div>
          </div>
          <div class="skill-item">
            <i class="bi bi-grid-3x3-gap-fill skill-item-icon" aria-hidden="true"></i>
            <span class="name">Figma</span>
            <span class="level">熟练</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar" style="width:80%"></div></div>
            </div>
          </div>
          <h3 class="h6 text-muted mt-3">设计能力</h3>
          <ul class="ability-list">
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 平面设计</li>
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> UI 设计</li>
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 品牌视觉</li>
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 海报设计</li>
          </ul>
        </div>
        <div class="col-md-6 skills-column">
          <h2>计算机信息能力</h2>
          <h3 class="h6 text-muted mt-3">技术工具</h3>
          <div class="skill-item">
            <i class="bi bi-code-slash skill-item-icon" aria-hidden="true"></i>
            <span class="name">HTML/CSS</span>
            <span class="level">基础</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar accent" style="width:65%"></div></div>
            </div>
          </div>
          <div class="skill-item">
            <i class="bi bi-filetype-py skill-item-icon" aria-hidden="true"></i>
            <span class="name">Python</span>
            <span class="level">基础（设计自动化）</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar accent" style="width:60%"></div></div>
            </div>
          </div>
          <div class="skill-item">
            <i class="bi bi-file-earmark-spreadsheet-fill skill-item-icon" aria-hidden="true"></i>
            <span class="name">Excel</span>
            <span class="level">数据分析</span>
            <div class="progress-wrap flex-grow-1 ms-2" style="max-width:100px;">
              <div class="progress"><div class="progress-bar accent" style="width:70%"></div></div>
            </div>
          </div>
          <h3 class="h6 text-muted mt-3">技术应用</h3>
          <ul class="ability-list">
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 网页设计</li>
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 设计素材自动化处理</li>
            <li><i class="bi bi-check2-circle-fill ability-icon" aria-hidden="true"></i> 用户数据可视化</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script src="js/common.js"></script>

</html>
