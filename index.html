  <main class="container">
    <section class="cover-section">
      <div class="row align-items-center g-4">
        <div class="col-md-5">
          <div class="cover-photo-wrap">
            <div id="coverCarousel" class="carousel slide cover-carousel" data-bs-ride="carousel" data-bs-interval="5000">
              <div class="carousel-indicators">
                <button type="button" data-bs-target="#coverCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="职业照"></button>
                <button type="button" data-bs-target="#coverCarousel" data-bs-slide-to="1" aria-label="作品一"></button>

              </div>
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img src="images/avatar.jpg" alt="雷青青 职业照" class="cover-photo d-block w-100" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='images/avatar.svg';this.alt='职业照占位';}">
                </div>
                <div class="carousel-item" style="cursor:pointer;" onclick="window.location.href='portfolio.html?work=project1'">
                  <img src="images/works/project1-cover.jpg" alt="校园文化节海报设计 - 点击查看详情" class="cover-photo d-block w-100" onerror="if(!this.dataset.fb){this.dataset.fb='1';this.src='images/works/project1.jpg';}else{this.onerror=null;this.src='images/works/placeholder.svg';this.alt='作品图占位';}">
                  <div class="carousel-caption d-none d-md-block">
                    <span class="badge bg-primary"><i class="bi bi-eye"></i> 点击查看作品详情</span>
                  </div>
                </div>
                <div class="carousel-item" style="cursor:pointer;" onclick="window.location.href='portfolio.html?work=project2'">
                  <img src="images/works/project2-cover.jpg" alt="交互式产品宣传页设计 - 点击查看详情" class="cover-photo d-block w-100" onerror="if(!this.dataset.fb){this.dataset.fb='1';this.src='images/works/project2.jpg';}else{this.onerror=null;this.src='images/works/placeholder.svg';this.alt='作品图占位';}">
                  <div class="carousel-caption d-none d-md-block">
                    <span class="badge bg-primary"><i class="bi bi-eye"></i> 点击查看作品详情</span>
                  </div>
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#coverCarousel" data-bs-slide="prev" aria-label="上一张">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#coverCarousel" data-bs-slide="next" aria-label="下一张">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
              </button>

          </div>
        </div>
        <div class="col-md-7">
          <div class="cover-content">
            <h1>广告设计×技术落地 | 用设计解决问题的实践者</h1>
            <p class="name">雷青青</p>
            <p class="identity">现任团支书，计算机信息学院学生会主席团成员</p>
            <p class="position">求职岗位：广告设计师 / 视觉设计师 / UI 设计师</p>
            <div class="skill-tags">
              <span class="skill-tag"><i class="bi bi-palette-fill skill-tag-icon" aria-hidden="true"></i> PS/AI</span>
              <span class="skill-tag"><i class="bi bi-box-fill skill-tag-icon" aria-hidden="true"></i> C4D</span>
              <span class="skill-tag"><i class="bi bi-grid-3x3-gap-fill skill-tag-icon" aria-hidden="true"></i> Figma</span>
              <span class="skill-tag"><i class="bi bi-code-slash skill-tag-icon" aria-hidden="true"></i> HTML/CSS</span>
            </div>
            <div class="cover-contact">
              <p>电话：138-xxxx-xxxx</p>
              <p>邮箱：example@email.com</p>
              <p>作品集：<a href="portfolio.html" target="_blank" rel="noopener"><i class="bi bi-box-arrow-up-right"></i> 浏览全部作品</a> / <a href="#" target="_blank" rel="noopener">Behance</a></p>
            </div>
            <div id="visitInfo" class="visit-info" aria-live="polite"></div>
          </div>
        </div>
